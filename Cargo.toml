[package]
name = "ecs-sd"
version = "0.1.0"
edition = "2024"

[dependencies]
aws-config = "1.8.16"
aws-sdk-ecs = "1.124.0"
aws-sdk-ec2 = "1.0"
tokio = { version = "1.52.2", features = ["full"] }
axum = "0.7"
tower = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
